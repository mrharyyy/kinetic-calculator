<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Kinetic Calculator</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "on-background": "#2b3438",
                "surface-container": "#e9eff3",
                "surface-container-high": "#e2e9ee",
                "on-surface": "#2b3438",
                "surface-container-low": "#eff4f8",
                "surface-container-lowest": "#ffffff",
                "primary-container": "#a6eff3",
                "surface": "#f7fafc",
                "primary": "#15696d",
                "secondary-container": "#dbe4e8",
                "on-surface-variant": "#586065",
              },
              fontFamily: {
                "headline": ["Manrope"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            },
          },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7fafc;
            min-height: max(884px, 100dvh);
            -webkit-tap-highlight-color: transparent; /* Removes default blue tap highlight on mobile */
        }
        .display-font {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="text-on-background min-h-screen flex flex-col overflow-hidden relative">
    <header class="bg-slate-50 flex items-center justify-between px-4 h-16 w-full fixed top-0 z-40">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="p-2 rounded-full active:bg-slate-200 transition-colors">
                <span class="material-symbols-outlined text-[#15696d]">menu</span>
            </button>
            <h1 class="font-manrope font-semibold text-lg text-[#15696d]">Calculator</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleHistory()" class="p-2 rounded-full active:bg-slate-200 transition-colors">
                <span class="material-symbols-outlined text-[#15696d]">history</span>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col pt-16">
        <section class="flex-1 bg-surface-container-low px-6 pb-8 flex flex-col justify-end items-end">
            <div id="equation-display" class="font-body text-on-surface-variant text-2xl font-normal tracking-tight mb-2"></div>
            <div id="display" class="font-body text-on-surface text-6xl font-extrabold tracking-tighter overflow-hidden">0</div>
        </section>

        <section class="bg-surface p-4 pb-8">
            <div class="bg-surface-container rounded-DEFAULT p-4 max-w-lg mx-auto">
                <div class="grid grid-cols-4 gap-4">
                    <button onclick="clearDisplay()" class="bg-secondary-container text-[#4a5357] font-label text-xl font-medium h-16 rounded-lg active:bg-[#cdd6da] active:scale-95 transition-all">C</button>
                    <button onclick="handleBrackets()" class="bg-secondary-container text-[#4a5357] font-label text-xl font-medium h-16 rounded-lg active:bg-[#cdd6da] active:scale-95 transition-all">( )</button>
                    <button onclick="appendNumber('%')" class="bg-secondary-container text-[#4a5357] font-label text-xl font-medium h-16 rounded-lg active:bg-[#cdd6da] active:scale-95 transition-all">%</button>
                    <button onclick="appendOperator('÷')" class="bg-primary-container text-[#005b5f] font-label text-3xl font-semibold h-16 rounded-full active:bg-[#86d7db] active:scale-95 transition-all">÷</button>

                    <button onclick="appendNumber('7')" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">7</button>
                    <button onclick="appendNumber('8')" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">8</button>
                    <button onclick="appendNumber('9')" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">9</button>
                    <button onclick="appendOperator('×')" class="bg-primary-container text-[#005b5f] font-label text-3xl font-semibold h-16 rounded-full active:bg-[#86d7db] active:scale-95 transition-all">×</button>

                    <button onclick="appendNumber('4')" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">4</button>
                    <button onclick="appendNumber('5')" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">5</button>
                    <button onclick="appendNumber('6')" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">6</button>
                    <button onclick="appendOperator('-')" class="bg-primary-container text-[#005b5f] font-label text-3xl font-semibold h-16 rounded-full active:bg-[#86d7db] active:scale-95 transition-all">−</button>

                    <button onclick="appendNumber('1')" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">1</button>
                    <button onclick="appendNumber('2')" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">2</button>
                    <button onclick="appendNumber('3')" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">3</button>
                    <button onclick="appendOperator('+')" class="bg-primary-container text-[#005b5f] font-label text-3xl font-semibold h-16 rounded-full active:bg-[#86d7db] active:scale-95 transition-all">+</button>

                    <button onclick="appendNumber('0')" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">0</button>
                    <button onclick="appendDecimal()" class="bg-white text-[#2b3438] font-label text-2xl font-semibold h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all">.</button>
                    <button onclick="deleteLast()" class="bg-white text-[#835600] font-label text-2xl h-16 rounded-lg shadow-sm active:bg-gray-100 active:scale-95 transition-all flex items-center justify-center">
                        <span class="material-symbols-outlined">backspace</span>
                    </button>
                    <button onclick="calculate()" class="bg-gradient-to-br from-[#15696d] to-[#005d61] text-white font-label text-3xl font-bold h-16 rounded-xl shadow-lg active:scale-95 active:opacity-80 transition-all">=</button>
                </div>
            </div>
            
            <div class="mt-6 flex justify-center gap-2">
                <div class="bg-surface-container-high rounded-full p-1 flex items-center">
                    <button class="px-6 py-2 rounded-full bg-white text-primary font-label text-xs font-bold shadow-sm">STANDARD</button>
                    <button class="px-6 py-2 rounded-full text-[#586065] font-label text-xs font-medium">SCIENTIFIC</button>
                </div>
            </div>
        </section>
    </main>

    <div id="side-menu" class="hidden fixed inset-0 z-50">
        <div onclick="toggleMenu()" class="absolute inset-0 bg-black/20 backdrop-blur-sm transition-opacity"></div>
        <aside class="absolute inset-y-0 left-0 flex flex-col py-4 bg-white rounded-r-3xl h-full w-80 shadow-2xl">
            <div class="px-6 py-4 flex justify-between items-center">
                <span class="text-2xl font-black text-[#15696d]">Menu</span>
                <button onclick="toggleMenu()" class="p-2 rounded-full active:bg-slate-100"><span class="material-symbols-outlined">close</span></button>
            </div>
            <nav class="mt-4 flex flex-col gap-1">
                <div class="bg-[#e2e9ee] text-[#15696d] rounded-full mx-2 px-4 py-3 flex items-center gap-3 font-manrope text-sm font-medium">
                    <span class="material-symbols-outlined">calculate</span> Standard
                </div>
                <div class="text-[#586065] mx-2 px-4 py-3 flex items-center gap-3 font-manrope text-sm font-medium active:bg-[#f7fafc] rounded-full transition-colors cursor-pointer">
                    <span class="material-symbols-outlined">science</span> Scientific (Coming Soon)
                </div>
                <div onclick="toggleMenu(); toggleHistory();" class="text-[#586065] mx-2 px-4 py-3 flex items-center gap-3 font-manrope text-sm font-medium active:bg-[#f7fafc] rounded-full transition-colors cursor-pointer">
                    <span class="material-symbols-outlined">history</span> History
                </div>
            </nav>
        </aside>
    </div>

    <div id="history-panel" class="hidden fixed inset-0 z-50">
        <div onclick="toggleHistory()" class="absolute inset-0 bg-black/20 backdrop-blur-sm"></div>
        <aside class="absolute inset-y-0 right-0 flex flex-col py-4 bg-white rounded-l-3xl h-full w-80 shadow-2xl">
            <div class="px-6 py-4 flex justify-between items-center border-b border-gray-100">
                <span class="text-2xl font-black text-[#15696d]">History</span>
                <button onclick="clearHistory()" class="text-sm text-red-500 font-bold active:bg-red-50 px-3 py-1 rounded-full transition-colors">Clear</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto px-6 py-4">
            </div>
            <div class="px-6 py-4 border-t border-gray-100">
                <button onclick="toggleHistory()" class="w-full py-3 bg-[#e9eff3] active:bg-[#dbe4e9] text-[#15696d] font-bold rounded-xl transition-colors">Close</button>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
